root: "data"
train_csv: "data/train_labels.csv"
eval_csv: "data/public_test_labels.csv"
train_subdir: "train"
eval_subdir: "test_public"
modality: "rgb"        # rgb | depth | rgbd
val_mode: "train"      # train | eval

sequence:
  length: 1
  sampling: "even"     # even | random

transforms:
  resize: 256
  crop: 224
  rgb_mean: [0.485, 0.456, 0.406]
  rgb_std: [0.229, 0.224, 0.225]
  depth_mean: 0.0
  depth_std: 0.25

batch_size: 8
num_workers: 4
shuffle: true
pin_memory: true
persistent_workers: false
mask_rgb_with_depth: false
depth_mask_threshold: 0.2
